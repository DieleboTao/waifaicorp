<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WaifaiCorp – Sign Contract</title>
    <style>
        body { font-family: Georgia, serif; max-width: 900px; margin: 2rem auto; padding: 1rem; background: #f5f7fa; }
        .contract { background: white; padding: 2rem; border-radius: 12px; }
        .clause { margin-bottom: 1.5rem; }
        .clause-title { font-weight: bold; margin-bottom: 0.5rem; }
        button, .btn { background: #0B2B4B; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; }
        button:disabled { background: #ccc; }
        .error { color: red; } .success { color: green; }
        input, canvas, video { width: 100%; max-width: 500px; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 8px; }
        canvas { background: white; border: 2px solid #ccc; }
        .flex-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
</head>
<body>
<div id="loading">Loading contract...</div>
<div id="contractContainer" style="display:none;"></div>
<script>
    let signaturePad = null;
    let mediaStream = null;
    let capturedSelfie = null;
    let verifiedEmail = null;
    let currentContract = null;

    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
        document.getElementById('loading').innerHTML = '<p class="error">Invalid link</p>';
    } else {
        fetch(`/api/client/sign-direct/${token}`)
            .then(res => { if(!res.ok) throw new Error('Contract not found'); return res.json(); })
            .then(data => {
                currentContract = data.contract;
                document.getElementById('loading').style.display = 'none';
                renderContract(currentContract);
            })
            .catch(err => { document.getElementById('loading').innerHTML = '<p class="error">Error loading contract: ' + err.message + '</p>'; });
    }

    function renderContract(contract) {
        let html = `<div class="contract"><h1>${escapeHtml(contract.title)}</h1>`;
        contract.clauses.forEach(c => {
            html += `<div class="clause"><div class="clause-title">${escapeHtml(c.title)}</div><div>${escapeHtml(c.content)}</div></div>`;
        });
        html += `<h3>Parties</h3>`;
        contract.parties.forEach(p => {
            html += `<p><strong>${escapeHtml(p.name)}</strong> (${p.role}) – ${p.email || 'no email'}</p>`;
        });
        html += `<div id="signingArea" style="margin-top:2rem;"></div></div>`;
        document.getElementById('contractContainer').innerHTML = html;
        showVerificationStep();
    }

    function showVerificationStep() {
        const area = document.getElementById('signingArea');
        area.innerHTML = `
            <h3>Verify your email</h3>
            <input type="email" id="verifyEmail" placeholder="Your email address" style="width:100%;">
            <button id="sendOtpBtn">Send verification code</button>
            <div id="otpSection" style="display:none; margin-top:1rem;">
                <input type="text" id="otpCode" placeholder="Enter 6-digit code">
                <button id="verifyOtpBtn">Verify code</button>
            </div>
            <div id="signatureSection" style="display:none; margin-top:2rem;">
                <h3>Digital Signature</h3>
                <canvas id="signatureCanvas" width="500" height="200"></canvas>
                <div class="flex-buttons"><button id="clearSignature">Clear</button></div>
                <h3>Selfie Verification</h3>
                <video id="video" autoplay muted playsinline></video>
                <div class="flex-buttons">
                    <button id="captureSelfie">Capture Selfie</button>
                    <button id="retakeSelfie" style="display:none;">Retake</button>
                </div>
                <div id="selfiePreview"></div>
                <button id="finalSignBtn" style="margin-top:1rem;">I Agree and Sign</button>
                <div id="signedMsg"></div>
            </div>
        `;

        // OTP flow
        const sendBtn = document.getElementById('sendOtpBtn');
        const verifyEmailInput = document.getElementById('verifyEmail');
        const otpSection = document.getElementById('otpSection');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const otpCodeInput = document.getElementById('otpCode');
        const signatureSection = document.getElementById('signatureSection');

        sendBtn.onclick = async () => {
            const email = verifyEmailInput.value.trim();
            if (!email) { alert('Enter email'); return; }
            sendBtn.disabled = true;
            const res = await fetch('/api/send-otp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
            if (res.ok) {
                alert('Verification code sent to ' + email);
                otpSection.style.display = 'block';
            } else {
                alert('Failed to send code. Email service not configured?');
                sendBtn.disabled = false;
            }
        };

        verifyOtpBtn.onclick = async () => {
            const email = verifyEmailInput.value.trim();
            const code = otpCodeInput.value.trim();
            const res = await fetch('/api/verify-otp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, code }) });
            if (res.ok) {
                verifiedEmail = email;
                alert('Email verified! You can now sign.');
                signatureSection.style.display = 'block';
                initSignatureAndCamera();
            } else {
                alert('Invalid or expired code');
            }
        };
    }

    function initSignatureAndCamera() {
        const canvas = document.getElementById('signatureCanvas');
        canvas.width = 500; canvas.height = 200;
        signaturePad = new SignaturePad(canvas, { backgroundColor: 'white' });
        document.getElementById('clearSignature').onclick = () => signaturePad.clear();

        // Camera
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { mediaStream = stream; document.getElementById('video').srcObject = stream; })
            .catch(err => alert('Camera error: ' + err));

        document.getElementById('captureSelfie').onclick = () => {
            const video = document.getElementById('video');
            const canvasSelfie = document.createElement('canvas');
            canvasSelfie.width = video.videoWidth;
            canvasSelfie.height = video.videoHeight;
            canvasSelfie.getContext('2d').drawImage(video, 0, 0);
            capturedSelfie = canvasSelfie.toDataURL('image/jpeg');
            document.getElementById('selfiePreview').innerHTML = `<img src="${capturedSelfie}" style="max-width:200px;">`;
            document.getElementById('captureSelfie').style.display = 'none';
            document.getElementById('retakeSelfie').style.display = 'inline-block';
        };
        document.getElementById('retakeSelfie').onclick = () => { capturedSelfie = null; document.getElementById('selfiePreview').innerHTML = ''; document.getElementById('captureSelfie').style.display = 'inline-block'; document.getElementById('retakeSelfie').style.display = 'none'; };

        document.getElementById('finalSignBtn').onclick = async () => {
            if (!verifiedEmail) { alert('Please verify your email first.'); return; }
            const signatureData = signaturePad.isEmpty() ? null : signaturePad.toDataURL();
            const res = await fetch(`/api/client/sign-direct/${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ signerEmail: verifiedEmail, signatureData, selfieData: capturedSelfie })
            });
            if (res.ok) {
                document.getElementById('signedMsg').innerHTML = '<p class="success">✅ Signed successfully! A confirmation email has been sent.</p>';
                document.getElementById('finalSignBtn').disabled = true;
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            } else {
                const err = await res.json();
                document.getElementById('signedMsg').innerHTML = '<p class="error">Error: ' + err.error + '</p>';
            }
        };
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
</script>
</body>
</html>
